      if (upper === "CHASE") execCls = " exec-chase";
      else if (upper === "COREY") execCls = " exec-corey";
      else if (upper === "MIKE" || upper === "MICHAEL") execCls = " exec-mike";
      html += '<div class="fc-shift' + (isOpen ? " open" : execCls) + '"><span class="fc-shift-name">' + s.name + '</span><span class="fc-shift-time">' + fmtTime(s.start) + " - " + fmtTime(s.end) + '</span></div>';
    }
    html += "</div>";
    if (outs.length > 0) { html += '<div class="fc-out">' + outs.map(s => s.name).join(", ") + "</div>"; }
    html += "</div>";
  }
  if (!renderedAny && search) { days.innerHTML = '<div class="fc-empty"><div class="fc-empty-icon">🔎</div>No shifts found for "' + search + '".</div>'; }
  else { days.innerHTML = html; }
  if (!search) {
    const todayEl = document.querySelector(".fc-day.today");
    if (todayEl) setTimeout(() => todayEl.scrollIntoView({ behavior: "smooth", block: "start" }), 60);
  }
}
document.getElementById("search").addEventListener("input", render);
document.getElementById("search").value = localStorage.getItem(SEARCH_KEY) || "";
try { document.getElementById("cowork-updated-stamp").textContent = "Updated: " + new Date(STATIC_STATE.last_updated).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}); } catch(e){}
async function _checkFresh(){try{const r=await fetch(location.pathname+"?_="+Date.now(),{cache:"no-store"});const t=await r.text();const m=t.match(/"last_updated":"([^"]+)"/);if(m&&m[1]!==STATIC_STATE.last_updated){location.reload();}}catch(e){}}
document.addEventListener("visibilitychange",function(){if(!document.hidden)_checkFresh();});
render();
</script>
